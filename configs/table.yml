df_columns:
  FPR@95: fpr
  AUROC: auc
  ACC: 
  AUPR_IN:
  AUPR_OUT:

index_fill_values:
  epoch: 0
  epochs: 0
  param_mu_alt: none
  margin: 0.

hidden_index:
  - exp
  - job
  - date
  - oods
  - workers
  - epoch

flash: True

parse_dates: [date]

index_order: ['set', 'net', '...', 'ood', 'phase', 'epoch', 'date', 'job']

index_dependencies:
  beta: [s_ood]

create_col:
  iter: \chunk * (1 + max(\id_pad, 0) + max(\ood_pad, 0) + \self_pad) * \epochs / \batch_size
  
